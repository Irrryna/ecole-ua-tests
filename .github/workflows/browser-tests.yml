name: Browser Tests

on:
  push:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecole_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: change-me-in-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ecole_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://admin:change-me-in-ci@127.0.0.1:5432/ecole_db?schema=public
      JWT_SECRET: ci-jwt-secret
      FRONTEND_URL: http://127.0.0.1:4200
      PORT: 3000
      BREVO_API_KEY: ''
      CLOUDINARY_CLOUD_NAME: ''
      CLOUDINARY_API_KEY: ''
      CLOUDINARY_API_SECRET: ''
      ADMIN_LOCAL_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_LOCAL_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_LOCAL_FIRST_NAME: Admin
      ADMIN_LOCAL_LAST_NAME: Ecole
      CI: true

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4
        with:
          path: ecole-ua-tests

      - name: Checkout main project (private)
        uses: actions/checkout@v4
        with:
          repository: Irrryna/ecole-ukrainienne-lyon
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          path: ecole-ukrainienne-lyon

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ecole-ukrainienne-lyon/backend/package-lock.json
            ecole-ukrainienne-lyon/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ecole-ukrainienne-lyon/backend
        run: npm ci

      - name: Prepare backend database
        working-directory: ecole-ukrainienne-lyon/backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build backend
        working-directory: ecole-ukrainienne-lyon/backend
        run: npm run build

      - name: Start backend
        working-directory: ecole-ukrainienne-lyon/backend
        run: node dist/src/main > /tmp/backend.log 2>&1 &

      - name: Install frontend dependencies
        working-directory: ecole-ukrainienne-lyon/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ecole-ukrainienne-lyon/frontend
        run: npm run build -- --configuration development

      - name: Start frontend
        working-directory: ecole-ukrainienne-lyon/frontend
        run: npx serve -s dist/frontend/browser -l 4200 > /tmp/frontend.log 2>&1 &

      - name: Wait for backend and frontend
        run: npx wait-on http://127.0.0.1:3000 http://127.0.0.1:4200 --timeout 120000

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOG ==="
          cat /tmp/backend.log || echo "(empty)"
          echo "=== FRONTEND LOG ==="
          cat /tmp/frontend.log || echo "(empty)"

      - name: Install test dependencies
        working-directory: ecole-ua-tests
        run: npm ci

      - name: Install Playwright browser
        working-directory: ecole-ua-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright test suite
        working-directory: ecole-ua-tests
        env:
          BACKEND_ROOT: ${{ github.workspace }}/ecole-ukrainienne-lyon/backend
          FRONTEND_ROOT: ${{ github.workspace }}/ecole-ukrainienne-lyon/frontend
        run: npm test

      - name: Show server logs on test failure
        if: failure()
        run: |
          echo "=== BACKEND LOG ==="
          cat /tmp/backend.log || echo "(empty)"
          echo "=== FRONTEND LOG ==="
          cat /tmp/frontend.log || echo "(empty)"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ecole-ua-tests/playwright-report
            ecole-ua-tests/test-results
          if-no-files-found: ignore
